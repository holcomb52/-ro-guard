name: Scheduled RO Guard reports

on:
  schedule:
    # 11:00 UTC daily (~6–7 AM US Eastern)
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  send-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Send due scheduled reports
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          REPORT_SMTP_HOST: ${{ secrets.REPORT_SMTP_HOST }}
          REPORT_SMTP_PORT: ${{ secrets.REPORT_SMTP_PORT }}
          REPORT_SMTP_USER: ${{ secrets.REPORT_SMTP_USER }}
          REPORT_SMTP_PASSWORD: ${{ secrets.REPORT_SMTP_PASSWORD }}
          REPORT_SMTP_FROM: ${{ secrets.REPORT_SMTP_FROM }}
          REPORT_SMTP_USE_TLS: ${{ secrets.REPORT_SMTP_USE_TLS }}
        run: python scripts/send_scheduled_reports.py
